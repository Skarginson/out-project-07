<div class="page-container">
  <h1>Modifier étudiant</h1>

  @if (loading()) {
    <p>Chargement...</p>
  } @else if (student()) {
    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
    <app-student-form [student]="student()" (submitted)="onSubmit($event)" (cancelled)="onCancel()" />
  } @else {
    <p class="error">{{ error() }}</p>
  }
</div>
